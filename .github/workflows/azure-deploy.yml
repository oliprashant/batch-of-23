name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger via gh workflow run

env:
  RESOURCE_GROUP: azure-ci-cd-rg
  VM_NAME: cicd-vm
  LOCATION: eastasia
  VM_IMAGE: Ubuntu2204
  VM_SIZE: Standard_D2s_v3

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 3. Provision Infrastructure (Idempotent)
        run: |
          echo "Checking/Creating Resource Group..."
          az group create --name ${{ env.RESOURCE_GROUP }} --location ${{ env.LOCATION }}
          
          echo "Checking if VM exists..."
          VM_EXISTS=$(az vm list -g ${{ env.RESOURCE_GROUP }} --query "[?name=='${{ env.VM_NAME }}'].name" -o tsv)
          
          if [ -z "$VM_EXISTS" ]; then
            echo "Provisioning new Ubuntu VM..."
            az vm create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.VM_NAME }} \
              --image ${{ env.VM_IMAGE }} \
              --size ${{ env.VM_SIZE }} \
              --admin-username azureuser \
              --generate-ssh-keys \
              --public-ip-sku Standard
              
            echo "Opening Port 80 in Network Security Group..."
            az vm open-port --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.VM_NAME }} --port 80 --priority 1001
          else
            echo "VM already exists. Checking power state..."
            VM_STATE=$(az vm show -g ${{ env.RESOURCE_GROUP }} -n ${{ env.VM_NAME }} -d --query powerState -o tsv)
            if [[ "$VM_STATE" != *"running"* ]]; then
              echo "VM is stopped. Starting VM automatically..."
              az vm start -g ${{ env.RESOURCE_GROUP }} -n ${{ env.VM_NAME }}
            fi
          fi

      - name: 4. Fetch Public IP Dynamically
        id: get-ip
        run: |
          VM_IP=$(az vm show -g ${{ env.RESOURCE_GROUP }} -n ${{ env.VM_NAME }} -d --query publicIps -o tsv)
          echo "VM_IP=$VM_IP" >> $GITHUB_ENV
          echo "Target Public IP: $VM_IP"

      - name: 5. Setup Apache and App Directory Structure
        run: |
          az vm run-command invoke \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.VM_NAME }} \
            --command-id RunShellScript \
            --scripts "
              sudo apt-get update -y && sudo apt-get install apache2 -y
              sudo mkdir -p /var/www/azure-cicd-app/v1 /var/www/azure-cicd-app/v2
              sudo chown -R azureuser:azureuser /var/www/azure-cicd-app
              
              if [ ! -f /etc/apache2/sites-available/azure-app.conf ]; then
                echo '<VirtualHost *:80>
                  DocumentRoot /var/www/azure-cicd-app/current
                  <Directory /var/www/azure-cicd-app/current>
                      AllowOverride None
                      Require all granted
                  </Directory>
                </VirtualHost>' | sudo tee /etc/apache2/sites-available/azure-app.conf
                
                sudo a2dissite 000-default.conf
                sudo a2ensite azure-app.conf
                sudo systemctl reload apache2
              fi
            "

      - name: 6. Blue-Green Deployment & Placeholder Replacement
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DEPLOY_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # Replace placeholders in HTML
          sed "s/__COMMIT_HASH__/$COMMIT_HASH/g; s/__DEPLOY_TIME__/$DEPLOY_TIME/g" \
            azure-demo-04/azure-ci-cd-pipeline/index.html > /tmp/index.html
          
          # Gzip the HTML to reduce size (106KB → ~20KB)
          gzip -c /tmp/index.html > /tmp/index.html.gz
          B64_GZ=$(base64 -w0 /tmp/index.html.gz)
          
          # Step 6a: Upload the gzipped HTML to the VM
          az vm run-command invoke \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.VM_NAME }} \
            --command-id RunShellScript \
            --scripts "echo '$B64_GZ' | base64 -d | gunzip > /tmp/index-upload.html"
          
          # Step 6b: Create and run the deploy script on the VM
          az vm run-command invoke \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.VM_NAME }} \
            --command-id RunShellScript \
            --scripts "
              CURRENT=\$(readlink -f /var/www/azure-cicd-app/current 2>/dev/null || echo '')
              if [ \"\$CURRENT\" = '/var/www/azure-cicd-app/v1' ]; then
                NEXT=v2
              else
                NEXT=v1
              fi
              
              echo \"Deploying to: \$NEXT\"
              sudo mkdir -p /var/www/azure-cicd-app/v1 /var/www/azure-cicd-app/v2
              sudo mv /tmp/index-upload.html /var/www/azure-cicd-app/\$NEXT/index.html
              sudo chown -R www-data:www-data /var/www/azure-cicd-app/\$NEXT
              sudo chmod 644 /var/www/azure-cicd-app/\$NEXT/index.html
              sudo ln -sfn /var/www/azure-cicd-app/\$NEXT /var/www/azure-cicd-app/current
              sudo systemctl reload apache2
              
              echo \"[\$(date)] Deployed $COMMIT_HASH to \$NEXT\" | sudo tee -a /var/www/azure-cicd-app/deploy.log
              echo \"Live: \$(readlink -f /var/www/azure-cicd-app/current)\"
              curl -s -o /dev/null -w 'Local: HTTP %{http_code}\n' http://localhost/
            "

      - name: 7. Verify Live Deployment
        run: |
          echo "Testing endpoint connection..."
          sleep 5
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://${{ env.VM_IP }}/)
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "🟢 Deployment Verification Succeeded! Site is live at http://${{ env.VM_IP }}/"
          else
            echo "🔴 Deployment Verification Failed with HTTP Status: $HTTP_STATUS"
            exit 1
          fi
